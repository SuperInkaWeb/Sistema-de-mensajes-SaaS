services:
  # ─── Backend Node.js ───────────────────────────────────────────────────────
  - type: web
    name: superinka-ss-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: superinka-ss-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://superinka-ss.vercel.app

databases:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  - name: superinka-ss-db
    databaseName: superinka_ss
    region: oregon
    plan: free
